<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!--
    Open Graph share image. 1200×630 is the canonical aspect ratio Slack /
    iMessage / Twitter / LinkedIn render at. Reuses the Drafting Studio
    identity: warm-paper background with a 24-px hairline grid overlay,
    cyan compass-rose monogram, sans-serif wordmark + tagline, and the
    same `SHEET · A-101` cadence the marketing surface uses.

    All shapes are vector — no raster assets — so the image stays
    crisp at any social-card render size and ships <2 KB.
  -->
  <defs>
    <pattern id="grid-fine" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#E8E4D8" stroke-width="0.5" />
    </pattern>
    <pattern id="grid-major" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#E8E4D8" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Warm paper background + two-layer blueprint grid -->
  <rect width="1200" height="630" fill="#FAFAF7" />
  <rect width="1200" height="630" fill="url(#grid-fine)" />
  <rect width="1200" height="630" fill="url(#grid-major)" />

  <!-- Top-left sheet header strip — mirrors the landing's hero CAD stamp -->
  <text
    x="80"
    y="100"
    font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, monospace"
    font-size="20"
    font-weight="500"
    fill="#155E75"
    letter-spacing="3.6"
  >
    A-101 · WORKPLACE PLANNING, DRAFTED
  </text>

  <!-- Compass-rose monogram + Floorcraft wordmark -->
  <g transform="translate(80, 240)">
    <rect x="0" y="0" width="56" height="56" rx="8" stroke="#0E7490" stroke-width="3.5" />
    <rect
      x="14"
      y="14"
      width="28"
      height="28"
      transform="rotate(45 28 28)"
      stroke="#0E7490"
      stroke-width="3.5"
    />
    <text
      x="80"
      y="42"
      font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
      font-size="44"
      font-weight="700"
      fill="#111827"
      letter-spacing="-1"
    >
      Floorcraft
    </text>
  </g>

  <!-- Display tagline — the same one rendered on the landing hero -->
  <text
    x="80"
    y="400"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="76"
    font-weight="700"
    fill="#111827"
    letter-spacing="-2"
  >
    Draft your office.
  </text>
  <text
    x="80"
    y="490"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="76"
    font-weight="700"
    fill="#111827"
    letter-spacing="-2"
  >
    Seat your team.
  </text>

  <!-- Bottom mono callout strip — sheet + scale signature -->
  <g transform="translate(80, 565)">
    <text
      font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, monospace"
      font-size="18"
      font-weight="500"
      fill="#6B7280"
      letter-spacing="3.2"
    >
      SHEET · A-101 · NORTH WING · 1 : 100 · FT/IN
    </text>
  </g>

  <!-- Right-side technical-drawing flourish (compact rendition of the
       hero's plan) so a square / wide social-card crop has visual
       interest beyond the wordmark. -->
  <g transform="translate(720, 220)">
    <!-- Outer room -->
    <rect x="0" y="0" width="400" height="240" stroke="#155E75" stroke-width="3" fill="none" />
    <!-- Interior partition -->
    <line x1="280" y1="0" x2="280" y2="240" stroke="#155E75" stroke-width="2.5" />
    <!-- Door arc -->
    <path d="M 280 110 A 24 24 0 0 1 304 134" fill="none" stroke="#155E75" stroke-width="1.5" opacity="0.5" />
    <!-- Open-plan desk grid -->
    <g stroke="#155E75" stroke-width="1.5" fill="#fff">
      <rect x="40" y="40" width="44" height="22" />
      <rect x="40" y="80" width="44" height="22" />
      <rect x="40" y="120" width="44" height="22" />
      <rect x="40" y="160" width="44" height="22" />
      <rect x="120" y="40" width="44" height="22" />
      <rect x="120" y="80" width="44" height="22" />
      <rect x="120" y="120" width="44" height="22" />
      <rect x="120" y="160" width="44" height="22" />
      <rect x="200" y="40" width="44" height="22" />
      <rect x="200" y="80" width="44" height="22" />
      <rect x="200" y="120" width="44" height="22" />
      <rect x="200" y="160" width="44" height="22" />
    </g>
    <!-- Private offices -->
    <g stroke="#155E75" stroke-width="1.5" fill="rgba(14, 116, 144, 0.18)">
      <rect x="312" y="20" width="68" height="50" />
      <rect x="312" y="90" width="68" height="50" />
      <rect x="312" y="170" width="68" height="50" />
    </g>
    <!-- Top dimension callout -->
    <line x1="0" y1="-24" x2="400" y2="-24" stroke="#155E75" stroke-width="1" />
    <text
      x="200"
      y="-32"
      text-anchor="middle"
      font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, monospace"
      font-size="14"
      fill="#155E75"
    >
      32′ — 6″
    </text>
  </g>
</svg>
