<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAFAF7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B1220" media="(prefers-color-scheme: dark)" />
    <title>Floorcraft — Office layout & seat management for hybrid teams</title>
    <meta
      name="description"
      content="Draft a floor plan in minutes, seat your whole team by the afternoon, and share a living map with every stakeholder that needs it."
    />

    <!-- Open Graph + Twitter card. Lets shared links on Slack / iMessage /
         Twitter render with a proper title, description, and brand mark
         instead of a bare URL. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Floorcraft — Office layout & seat management" />
    <meta
      property="og:description"
      content="Draft a floor plan in minutes, seat your whole team by the afternoon, and share a living map with every stakeholder that needs it."
    />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Floorcraft — Office layout & seat management" />
    <meta
      name="twitter:description"
      content="Draft a floor plan in minutes, seat your whole team by the afternoon, and share a living map with every stakeholder that needs it."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
